name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    env:
      # Fully offline: classical extraction + hashing embeddings. No models, no network.
      MTA_NO_OLLAMA: "1"
      MTA_AUTO_UPDATE: "off"
      MTA_EXTRACT: "classical"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (package + test deps only — heavy converters are not needed offline)
        run: |
          python -m pip install --upgrade pip
          pip install numpy networkx rapidfuzz "mcp>=1.2" psutil pytest
          pip install -e . --no-deps

      - name: Run offline smoke + e2e tests
        run: pytest tests/test_smoke.py -q

      - name: MCP stdio tool-registration check
        run: python tests/mcp_stdio_check.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
