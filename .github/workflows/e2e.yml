name: E2E (Phase 6)

# Heavier clean-install CLI end-to-end. Runs on the release PR (develop → main) and
# on demand — not on every feature PR (the unit matrix + conversion-e2e cover those).
on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e-offline:
    runs-on: ubuntu-latest
    env:
      MTA_E2E: "1"
      MTA_NO_OLLAMA: "1"
      MTA_AUTO_UPDATE: "off"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: System deps (OCR/media)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr ffmpeg
      - name: Build + CLEAN-install the wheel (not editable) + its real deps
        run: |
          python -m pip install --upgrade pip build
          python -m build
          pip install "$(echo dist/*.whl)"   # installs the package + its runtime deps from the wheel
          pip install pytest
      - name: E2E CLI suite (offline — drives the installed `mta` binary)
        run: pytest tests/test_e2e_cli.py -v
