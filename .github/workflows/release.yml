name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Least privilege at the top; jobs widen only what they need.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build EVERY artifact exactly once, generate an SBOM, and sign each artifact
  # with cosign (keyless, Sigstore OIDC). Downstream jobs consume these artifacts
  # — nothing is rebuilt, so PyPI and the GitHub Release ship identical bytes.
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # cosign keyless signing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
      - name: Tag must match the package version
        if: github.ref_type == 'tag'
        run: python scripts/check_versions.py "${{ github.ref_name }}"
      - name: Build wheel + sdist (once) and validate
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Build + verify the .mcpb bundle (content, not just existence)
        run: |
          bash scripts/build_mcpb.sh
          test -f dist/memorised-them-all.mcpb
          python - <<'PY'
          import zipfile
          n = zipfile.ZipFile("dist/memorised-them-all.mcpb").namelist()
          assert "manifest.json" in n, "mcpb missing manifest.json"
          assert "launch.sh" in n, "mcpb missing launch.sh"
          assert any(e.startswith("mta/") for e in n), "mcpb missing mta/ package"
          for bad in ("program/", "eval/", "tests/", "scripts/"):
              assert not any(e.startswith(bad) for e in n), f"mcpb leaked {bad}"
          print(f"mcpb OK: {len(n)} entries")
          PY
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          path: .
          format: cyclonedx-json
          output-file: dist/sbom.cyclonedx.json
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3
      - name: Sign every artifact (keyless, Sigstore OIDC)
        run: |
          shopt -s nullglob
          for f in dist/*.whl dist/*.tar.gz dist/memorised-them-all.mcpb dist/sbom.cyclonedx.json; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" "$f"
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  # PyPI FIRST (required, OIDC Trusted Publishing). If the publisher isn't
  # configured or the upload fails, the train HALTS here — so a misconfigured
  # release never leaves a published GitHub Release behind (no partial release).
  pypi:
    needs: build
    # Publish ONLY on a real tag push. A manual workflow_dispatch run therefore
    # builds + signs as a dry-run but never publishes (closes the tag-gate bypass).
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # PyPI Trusted Publishing — no long-lived token in the repo
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist
      - name: Stage only the wheel + sdist for PyPI
        run: |
          mkdir -p pkg
          cp dist/*.whl dist/*.tar.gz pkg/
      - name: Publish to PyPI (OIDC Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: pkg
          skip-existing: true   # idempotent — a re-run never double-publishes

  github_release:
    needs: pypi
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release + upload assets
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          path: src
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/memorised-them-all.mcpb
            dist/sbom.cyclonedx.json
            dist/*.sig
            dist/*.pem
            src/install.sh

  # Bump the Homebrew tap LAST. Gated on a cross-repo token; if it's absent the job
  # skips cleanly (the core PyPI + GitHub Release still shipped). Idempotent.
  homebrew:
    needs: github_release
    if: github.ref_type == 'tag'
    # Best-effort: a missing/revoked tap token must never fail the release — PyPI
    # and the GitHub Release have already shipped. The tap is bumped on the next
    # run (or manually) once the token is valid.
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - name: Gate on the tap token
        id: gate
        env:
          TOK: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TOK" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::HOMEBREW_TAP_TOKEN not set — skipping the tap bump (core release already shipped)."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.go == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: GRU-953/homebrew-memorised-them-all
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
      - if: steps.gate.outputs.go == 'true'
        name: Bump Formula/mta.rb to the released version (idempotent)
        env:
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VER="${REF#v}"
          URL="https://github.com/GRU-953/memorised-them-all/archive/refs/tags/${REF}.tar.gz"
          SHA="$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)"
          python - "$VER" "$URL" "$SHA" <<'PY'
          import re, sys
          ver, url, sha = sys.argv[1], sys.argv[2], sys.argv[3]
          path = "tap/Formula/mta.rb"
          s = open(path, encoding="utf-8").read()
          s = re.sub(r'url ".*?"', f'url "{url}"', s, count=1)
          s = re.sub(r'sha256 ".*?"', f'sha256 "{sha}"', s, count=1)
          s = re.sub(r'version ".*?"', f'version "{ver}"', s, count=1)
          open(path, "w", encoding="utf-8").write(s)
          PY
          cd tap
          if git diff --quiet; then
            echo "Tap already at ${VER} — nothing to do."
            exit 0
          fi
          git config user.name "mta-release[bot]"
          git config user.email "225374119+GRU-953@users.noreply.github.com"
          git commit -am "mta ${VER}"
          git push
