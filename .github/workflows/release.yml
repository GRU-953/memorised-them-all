name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create releases & upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assert git tag matches package version (no drift)
        if: github.ref_type == 'tag'
        run: python scripts/check_versions.py "${{ github.ref_name }}"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Build .mcpb bundle (Claude Desktop)
        run: bash scripts/build_mcpb.sh

      - name: Create / update GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/memorised-them-all.mcpb
            install.sh

  pypi:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      # Publishes if a PYPI_API_TOKEN secret is configured; otherwise skips
      # cleanly (stays green). To use Trusted Publishing instead, configure a
      # PyPI publisher for this repo + release.yml and swap this for
      # `pypa/gh-action-pypi-publish` with `permissions: id-token: write`.
      - name: Publish to PyPI (if token configured)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$TWINE_PASSWORD" ]; then
            twine upload --non-interactive --skip-existing dist/*
          else
            echo "PYPI_API_TOKEN not set — skipping PyPI publish (publish manually or add the secret)."
          fi
