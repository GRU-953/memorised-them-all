name: Docker

# Build-validate the image when the Docker setup changes (PR), and build + push a
# multi-arch image to GHCR on a release tag. Not run on every push — the package
# install itself is already covered by the CI `build` job, so the Docker-specific
# surface (base image, apt deps, layering) only needs checking when it changes.
on:
  push:
    tags: ["v*"]
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/gru-953/memorised-them-all

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR via the built-in GITHUB_TOKEN (tags only)
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - if: github.ref_type == 'tag'
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0
      - if: github.ref_type == 'tag'
        name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (validate); push multi-arch only on a tag
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          platforms: ${{ github.ref_type == 'tag' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.ref_type == 'tag' }}
          load: ${{ github.ref_type != 'tag' }}
          tags: ${{ github.ref_type == 'tag' && format('{0}:{1},{0}:latest', env.IMAGE, github.ref_name) || format('{0}:ci', env.IMAGE) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test the built image
        if: github.ref_type != 'tag'
        run: |
          docker run --rm ${{ env.IMAGE }}:ci mta --help
          docker run --rm ${{ env.IMAGE }}:ci mta export-schema --format openapi >/dev/null && echo "image OK: export-schema ran offline"
