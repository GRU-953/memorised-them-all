name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # create releases & upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Build .mcpb bundle (Claude Desktop)
        run: bash scripts/build_mcpb.sh

      - name: Create / update GitHub Release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/memorised-them-all.mcpb
            install.sh

  pypi:
    runs-on: ubuntu-latest
    needs: release
    # Publishes only when a PyPI token secret is configured (skipped otherwise).
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Publish to PyPI (token)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$TWINE_PASSWORD" ]; then
            twine upload --non-interactive dist/*
          else
            echo "PYPI_API_TOKEN not set — skipping PyPI publish."
          fi
