name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    env:
      # Fully offline: classical extraction + hashing embeddings. No models, no network.
      MTA_NO_OLLAMA: "1"
      MTA_AUTO_UPDATE: "off"
      MTA_EXTRACT: "classical"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (package + test deps only — heavy converters are not needed offline)
        run: |
          python -m pip install --upgrade pip
          pip install numpy networkx rapidfuzz "mcp>=1.2" psutil pytest
          pip install -e . --no-deps

      - name: Run offline smoke + concurrency tests (all 3 OSes)
        run: pytest tests/test_smoke.py tests/test_concurrency.py tests/test_migration.py tests/test_autoconfig.py tests/test_doctor.py tests/test_recall_offline.py tests/test_security.py tests/test_eval.py tests/test_review_fixes.py tests/test_transport.py tests/test_schema_export.py tests/test_rest_gateway.py tests/test_backends.py -q

      - name: MCP stdio tool-registration check
        run: python tests/mcp_stdio_check.py

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Single source of truth for the version (all manifests must agree)
        run: python scripts/check_versions.py

  conversion-e2e:
    # The offline matrix above installs NO converters (`pip install -e . --no-deps`),
    # so it never exercises the real PDF/DOCX/XLSX/CSV/HTML path. This lane installs
    # the full package + Tesseract and runs the conversion + OCR tests for real.
    runs-on: ubuntu-latest
    env:
      MTA_NO_OLLAMA: "1"
      MTA_AUTO_UPDATE: "off"
      MTA_EXTRACT: "classical"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install Tesseract OCR
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr
      - name: Install package WITH real converters + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Real conversion + offline e2e (full deps)
        run: pytest tests/ -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install twine
          twine check dist/*
      - name: Build + smoke-test the .mcpb bundle (mcpb packer validates the manifest)
        run: |
          bash scripts/build_mcpb.sh
          test -f dist/memorised-them-all.mcpb
          python - <<'PY'
          import zipfile
          z = zipfile.ZipFile("dist/memorised-them-all.mcpb")
          names = z.namelist()
          assert "manifest.json" in names, f"mcpb missing manifest.json: {names[:20]}"
          assert any(n.startswith("mta/") for n in names), "mcpb missing mta/ package"
          print(f"mcpb OK: {len(names)} entries")
          PY
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/*
